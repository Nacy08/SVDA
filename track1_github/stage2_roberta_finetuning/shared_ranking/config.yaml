experiment:
  name: expF_new
  task_name: svda_track1_fulcra_warmup
  output_root: /root/autodl-tmp/Task1_baseline1/expF_new/outputs
model:
  pretrained_model_name_or_path:  /root/autodl-tmp/FacebookAI/roberta-large
  max_length: 256
  dropout: 0.1
  hidden_dim: 512
  num_labels: 19

fulcra_model:
  hidden_dim: 256

data:
  train_path: /root/Task1_baseline1/data/svda/train.jsonl
  dev_path: /root/Task1_baseline1/data/svda/dev.jsonl
  text_field: Consistent Value Response
  label_field: Value

fulcra_data:
  path: /root/Task1_baseline1/data/fulcra/data_hybrid.jsonl
  text_field: dialogue
  value_types_field: value_types
  validation_split: 0.1

train:
  batch_size: 16
  learning_rate: 2.0e-5
  num_epochs: 10
  warmup_ratio: 0.1
  weight_decay: 0.01
  early_stopping_patience: 2
  num_workers: 0

fulcra_train:
  num_epochs: 2

eval:
  primary_metric: macro_f1

runtime:
  device: auto
  save_confusion_matrix_png: true

hybrid_ranking:
  enabled: true
  candidate_mode: core_plus_adjacent_1
  candidate_mode_grid: [adjacent_1, adjacent_2, core_plus_adjacent_1]
  lambda_hybrid_grid: [0.0, 0.1]
  lambda_global_grid: [0.0, 0.02]
  margin: 1.0
  top_k_hybrid: 1
  top_k_global: 1
  start_epoch: 2
  circular_order:
    - Self-direction–thought
    - Self-direction–action
    - Stimulation
    - Hedonism
    - Achievement
    - Power–dominance
    - Power–resources
    - Face
    - Security–personal
    - Security–societal
    - Tradition
    - Conformity–rules
    - Conformity–interpersonal
    - Humility
    - Benevolence–caring
    - Benevolence–dependability
    - Universalism–concern
    - Universalism–nature
    - Universalism–tolerance
  core_groups:
    - [Self-direction–thought, Self-direction–action]
    - [Power–dominance, Power–resources]
    - [Security–personal, Security–societal]
    - [Benevolence–caring, Benevolence–dependability]
    - [Universalism–concern, Universalism–nature, Universalism–tolerance]
