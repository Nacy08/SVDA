experiment:
  name: expI
  task_name: svda_track1_rdrop_fgm_ema
  output_root: /root/autodl-tmp/Task1_baseline1/expI/outputs

model:
  pretrained_model_name_or_path: /root/autodl-tmp/FacebookAI/roberta-large
  max_length: 256
  dropout: 0.1
  hidden_dim: 512
  num_labels: 19

data:
  train_path: /root/Task1_baseline1/data/svda/train.jsonl
  dev_path: /root/Task1_baseline1/data/svda/dev.jsonl
  text_field: Consistent Value Response
  label_field: Value
  question_field: Question
  use_question: true

train:
  batch_size: 16
  learning_rate: 2.0e-5
  num_epochs: 10
  warmup_ratio: 0.1
  weight_decay: 0.01
  early_stopping_patience: 3
  num_workers: 0

eval:
  primary_metric: macro_f1

runtime:
  device: auto
  save_confusion_matrix_png: true

regularization:
  r_drop_lambda: 1.0
  fgm_epsilon: 1.0
  ema_decay: 0.999

hybrid_ranking:
  enabled: true
  candidate_mode: adjacent_2
  lambda_hybrid: 0.1
  lambda_global: 0.05
  margin: 1.0
  top_k_hybrid: 1
  top_k_global: 1
  start_epoch: 2
  circular_order:
    - Self-direction–thought
    - Self-direction–action
    - Stimulation
    - Hedonism
    - Achievement
    - Power–dominance
    - Power–resources
    - Face
    - Security–personal
    - Security–societal
    - Tradition
    - Conformity–rules
    - Conformity–interpersonal
    - Humility
    - Benevolence–caring
    - Benevolence–dependability
    - Universalism–concern
    - Universalism–nature
    - Universalism–tolerance
  core_groups:
    - [Self-direction–thought, Self-direction–action]
    - [Power–dominance, Power–resources]
    - [Security–personal, Security–societal]
    - [Benevolence–caring, Benevolence–dependability]
    - [Universalism–concern, Universalism–nature, Universalism–tolerance]
